name: parity

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install parity dependencies
        run: bash scripts/ci/setup_parity_env.sh

      - name: Run parity tests
        run: bash scripts/ci/run_parity_tests.sh

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -o "dist/apprise-go-${GOOS}-${GOARCH}" ./cmd/apprise

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: apprise-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/apprise-go-${{ matrix.goos }}-${{ matrix.goarch }}
